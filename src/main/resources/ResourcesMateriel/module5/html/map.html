<!DOCTYPE html>
<html>
<head>
    <title>Ambulance Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- LEAFET_CSS_REPLACED_BY_JAVA -->
    <!-- LEAFLET_JS_REPLACED_BY_JAVA -->
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        #map {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100% !important;
            height: 100% !important;
            background: #1a1a2e;
        }
        .ambulance-icon {
            font-size: 24px;
        }
        /* Remove the default white background Leaflet puts on divIcons */
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }

        /*
         * ── JavaFX WebKit Rendering Fixes ──────────────────────────────
         *
         * JavaFX's WebKit compositor has a broken translate3d() implementation.
         * Setting L.Browser.any3d = false forces Leaflet to use 2D translate()
         * for the map-pane (pan positioning) and plain CSS left/top for tiles.
         *
         * However, Leaflet's CSS still defines transition rules that cause
         * stuttering in JavaFX WebKit. We disable those transitions below.
         *
         * IMPORTANT: We do NOT override transform on .leaflet-map-pane because
         * Leaflet NEEDS transforms on the map-pane for panning. The any3d=false
         * flag ensures it uses translate() instead of translate3d().
         */

        /* Disable all CSS transitions — they cause stuttering in JavaFX WebKit */
        .leaflet-tile,
        .leaflet-tile-container,
        .leaflet-tile-pane,
        .leaflet-map-pane,
        .leaflet-overlay-pane,
        .leaflet-marker-pane,
        .leaflet-zoom-animated {
            -webkit-transition: none !important;
            transition: none !important;
        }

        /* Disable 3D rendering hints on tiles — prevents compositing artifacts */
        .leaflet-tile {
            -webkit-backface-visibility: hidden;
            -webkit-perspective: 0;
            -webkit-transform-style: flat;
            will-change: auto !important;
            image-rendering: auto;
        }

        /* Prevent the Safari-specific tile container hack from interfering */
        .leaflet-safari .leaflet-tile-container {
            width: auto;
            height: auto;
            -webkit-transform-origin: 0 0;
        }

        /* Fix tile images: disable blend mode that JavaFX WebKit doesn't support well */
        .leaflet-container img.leaflet-tile {
            mix-blend-mode: normal !important;
        }

        /* Ensure the zoom-animated class doesn't trigger 3D transforms */
        .leaflet-zoom-animated {
            -webkit-transform-origin: 0 0;
            transform-origin: 0 0;
            will-change: auto !important;
        }

        /* Disable fade animations — cause ghosting in WebView */
        .leaflet-fade-anim .leaflet-popup {
            -webkit-transition: none !important;
            transition: none !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        console.log('[Map] Leaflet loaded, initializing map...');

        // ── Disable CSS 3D transforms for JavaFX WebKit ──────────────
        // Leaflet auto-detects 3D transform support and uses translate3d()
        // for tile positioning. JavaFX WebKit claims support but the
        // compositor doesn't render correctly.
        // Setting any3d = false makes Leaflet use translate() for the map-pane
        // and simple left/top for tile positioning.
        L.Browser.any3d = false;
        L.Browser.ie3d = false;
        L.Browser.webkit3d = false;
        L.Browser.gecko3d = false;

        // Disable transitions entirely — JavaFX WebKit handles them poorly
        if (L.DomUtil && L.DomUtil.TRANSITION) {
            L.DomUtil.TRANSITION = '';
        }

        // ── Map init ──────────────────────────────────────────────────
        var map = L.map('map', {
            zoomControl: true,
            attributionControl: true,
            fadeAnimation: false,
            zoomAnimation: false,
            markerZoomAnimation: false,
            zoomSnap: 1,
            preferCanvas: false,
            // Prevent transform3DLimit from triggering resets
            transform3DLimit: Infinity
        }).setView([36.8065, 10.1815], 13);

        console.log('[Map] Map initialized, container size:',
            document.getElementById('map').offsetWidth + 'x' + document.getElementById('map').offsetHeight);

        // Suppress warnings about missing default icon assets
        L.Icon.Default.prototype.options.imagePath = '';

        // ── Tile layer ────────────────────────────────────────────────
        // No crossOrigin — JavaFX WebKit blocks tiles with CORS headers
        var tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            keepBuffer: 4,
            updateWhenIdle: true,
            updateWhenZooming: false,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Listen for tile errors to diagnose loading issues
        map.on('tileerror', function(err) {
            console.error('[Map] Tile error:', err.tile ? err.tile.src : 'unknown', err.error);
        });

        // Log tile loads for debugging
        tileLayer.on('loading', function() { console.log('[Map] Tiles loading...'); });
        tileLayer.on('load', function() {
            console.log('[Map] All tiles loaded.');
            // Final invalidateSize after tiles are loaded to fix alignment
            setTimeout(function() {
                map.invalidateSize({ animate: false, pan: false });
            }, 200);
        });

        // ── invalidateSize — called at multiple intervals ──────────────
        // JavaFX layout settles in stages; fire at several times.
        function fixSize() {
            if (typeof map !== 'undefined' && map._container) {
                map.invalidateSize({ animate: false, pan: false });
                console.log('[Map] invalidateSize, container:',
                    document.getElementById('map').offsetWidth + 'x' +
                    document.getElementById('map').offsetHeight);
            }
        }
        setTimeout(fixSize, 200);
        setTimeout(fixSize, 500);
        setTimeout(fixSize, 1000);
        setTimeout(fixSize, 2000);
        setTimeout(fixSize, 3500);
        setTimeout(fixSize, 5000);

        // Also hook into window resize
        window.addEventListener('resize', function() {
            setTimeout(fixSize, 50);
            setTimeout(fixSize, 300);
        });

        // ResizeObserver on the map div
        if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(function() {
                setTimeout(fixSize, 50);
            }).observe(document.getElementById('map'));
        }

        // ── Click → Java ──────────────────────────────────────────────
        map.on('click', function(e) {
            if (window.javaConnector) {
                window.javaConnector.onMapClick(e.latlng.lat, e.latlng.lng);
            }
        });

        var markers         = {};
        var routeLine       = null;
        var ambulanceMarker = null;
        var animFrameId     = null;

        // ── Markers ───────────────────────────────────────────────────
        function setMarker(id, lat, lon, label, iconText) {
            if (markers[id]) map.removeLayer(markers[id]);
            var icon = L.divIcon({
                html: '<div style="font-size:26px;line-height:1;">' + iconText + '</div>',
                className: '',          // empty string removes Leaflet's white-box default
                iconSize:   [32, 32],
                iconAnchor: [16, 16]
            });
            markers[id] = L.marker([lat, lon], { icon: icon }).addTo(map).bindPopup(label);
            autoZoom();
        }

        function autoZoom() {
            var group = new L.featureGroup(Object.values(markers));
            if (group.getLayers().length > 0) {
                map.fitBounds(group.getBounds(), { padding: [60, 60], animate: false });
            }
        }

        // ── Route drawing ─────────────────────────────────────────────
        function drawRoute(coordinates) {
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline(coordinates, {
                color: '#3b82f6',
                weight: 4,
                opacity: 0.8,
                smoothFactor: 1.5
            }).addTo(map);
        }

        // ── Ambulance animation — capped at 30 fps ────────────────────
        function animateAmbulance(coordinates, durationSeconds) {
            if (ambulanceMarker) map.removeLayer(ambulanceMarker);
            if (animFrameId) cancelAnimationFrame(animFrameId);

            var icon = L.divIcon({
                html: '<div style="font-size:26px;line-height:1;">🚑</div>',
                className: '',
                iconSize:   [32, 32],
                iconAnchor: [16, 16]
            });
            ambulanceMarker = L.marker(coordinates[0], { icon: icon }).addTo(map);

            var totalPoints = coordinates.length;
            var totalMs     = durationSeconds * 1000;

            // Sub-sample long routes to stay near 30 fps
            var step = Math.max(1, Math.floor(totalPoints / 300));
            var sampled = [];
            for (var i = 0; i < totalPoints; i += step) sampled.push(coordinates[i]);
            if (sampled[sampled.length - 1] !== coordinates[totalPoints - 1]) {
                sampled.push(coordinates[totalPoints - 1]);
            }

            var msPerStep = Math.max(33, totalMs / sampled.length);
            var index     = 0;
            var lastTime  = performance.now();

            function move(now) {
                if (now - lastTime >= msPerStep) {
                    if (index < sampled.length) {
                        ambulanceMarker.setLatLng(sampled[index++]);
                        lastTime = now;
                    }
                }
                if (index < sampled.length) {
                    animFrameId = requestAnimationFrame(move);
                } else {
                    ambulanceMarker.setLatLng(sampled[sampled.length - 1]);
                    animFrameId = null;
                }
            }
            animFrameId = requestAnimationFrame(move);
        }

        // ── Clear ─────────────────────────────────────────────────────
        function clearMap() {
            if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
            Object.values(markers).forEach(function(m) { map.removeLayer(m); });
            markers = {};
            if (routeLine)       { map.removeLayer(routeLine);       routeLine = null; }
            if (ambulanceMarker) { map.removeLayer(ambulanceMarker); ambulanceMarker = null; }
        }

        // ── Show existing trip (called from Java for live tracking) ───
        // routeJson : JSON string "[[ lat, lon ], ...]" calculé côté Java via OSRM
        // Si routeJson est vide ou null, on trace une ligne droite de secours.
        function afficherTrajetExistant(baseLat, baseLon, urgLat, urgLon,
                                        depart, urgence, distanceKm, dureeMin, routeJson) {
            clearMap();
            setMarker('base',    baseLat, baseLon, '🏥 ' + depart,  '🏥');
            setMarker('urgence', urgLat,  urgLon,  '🚨 ' + urgence, '🚨');

            var coords;
            try {
                coords = routeJson ? JSON.parse(routeJson) : null;
            } catch(e) {
                coords = null;
            }

            // Fallback : ligne droite si la route n'a pas pu être calculée
            if (!coords || coords.length < 2) {
                coords = [[baseLat, baseLon], [urgLat, urgLon]];
            }

            drawRoute(coords);

            // Marqueur ambulance positionné au départ
            var ambIcon = L.divIcon({
                html: '<div style="font-size:26px;line-height:1;">🚑</div>',
                className: '',
                iconSize: [32, 32], iconAnchor: [16, 16]
            });
            if (ambulanceMarker) map.removeLayer(ambulanceMarker);
            ambulanceMarker = L.marker([baseLat, baseLon], { icon: ambIcon }).addTo(map);
            ambulanceMarker.bindPopup(
                '🚑 En mission<br>' + parseFloat(distanceKm).toFixed(1) + ' km — ' + dureeMin + ' min'
            );

            // Zoom sur les deux points
            var group = new L.featureGroup([markers['base'], markers['urgence']]);
            map.fitBounds(group.getBounds(), { padding: [60, 60], animate: false });

            return 'SUCCESS';
        }
    </script>
</body>
</html>
